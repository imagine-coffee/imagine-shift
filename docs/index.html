<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>統合シフト管理</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
body{font-family:-apple-system,'Helvetica Neue',sans-serif;background:#f6f7f9;color:#1a1a1a;font-size:13px;padding:8px;padding-top:max(8px,env(safe-area-inset-top));padding-left:max(8px,env(safe-area-inset-left));padding-right:max(8px,env(safe-area-inset-right));padding-bottom:max(8px,env(safe-area-inset-bottom));overflow-x:hidden;}
.bar{display:flex;align-items:center;justify-content:center;gap:8px;flex-wrap:wrap;margin-bottom:8px;}
.bar button{font-size:13px;padding:6px 11px;border:1px solid #ccc;border-radius:8px;background:#fff;cursor:pointer;}
.bar button.on{background:#27500a;color:#eaf3de;border-color:#27500a;}
.bar button.save{background:#3c3489;color:#eeedfe;border-color:#3c3489;}
.ml{font-size:16px;font-weight:700;min-width:96px;text-align:center;}
.views{display:flex;gap:4px;margin-bottom:8px;background:#eef0f3;border-radius:10px;padding:4px;max-width:100%;overflow-x:auto;-webkit-overflow-scrolling:touch;}
.views button{font-size:12px;padding:7px 14px;border:none;border-radius:7px;background:transparent;color:#555;cursor:pointer;flex:none;white-space:nowrap;}
.views button.on{background:#fff;color:#111;font-weight:700;box-shadow:0 1px 3px rgba(0,0,0,.08);}
.title{font-size:12px;color:#888;}
.note{font-size:11px;color:#666;margin:6px 2px;}
.hours{font-size:10px;color:#777;margin:2px 2px 8px;line-height:1.6;}
.box{border:1px solid #d8dde6;border-radius:10px;background:#fff;max-height:74vh;overflow:auto;-webkit-overflow-scrolling:touch;transform:translateZ(0);}
.box.swipe-live{transition:none!important;will-change:transform,opacity;}
.box.swipe-anim{will-change:transform,opacity;}
@media (prefers-reduced-motion:reduce){.box.swipe-live,.box.swipe-anim{transition:none!important;transform:none!important;opacity:1!important;}}
table{border-collapse:separate;border-spacing:0;font-size:10px;}
th,td{border-right:1px solid #e6e9ed;border-bottom:1px solid #e6e9ed;white-space:nowrap;text-align:center;padding:0;}
thead th{position:sticky;top:0;z-index:6;background:#eef0f3;height:30px;font-size:9px;color:#444;padding:0 2px;}
.nm{position:sticky;left:0;z-index:5;background:#f4f6f8;text-align:left;padding:3px 5px;min-width:100px;font-weight:600;font-size:11px;border-right:1px solid #d8dde6;}
.locbadge{display:inline-block;min-width:20px;text-align:center;font-size:9px;font-weight:700;border-radius:4px;padding:1px 3px;margin-right:4px;color:#333;}
thead .nm{z-index:8;}
	td.cell{min-width:46px;width:46px;height:38px;cursor:default;vertical-align:middle;}
	td.cell.ed{cursor:pointer;}
	td.cell.ed:hover{outline:2px solid #2f80ed;outline-offset:-2px;}
	td.cell.sel{outline:3px solid #3c3489;outline-offset:-3px;box-shadow:inset 0 0 0 999px rgba(60,52,137,.08);}
.two{display:flex;flex-direction:column;line-height:1.12;min-height:38px;justify-content:center;align-items:center;position:relative;padding:1px;}
.tnote{font-size:8px;line-height:1.05;white-space:normal;word-break:break-word;max-width:60px;opacity:.9;margin-top:1px;}
.multi{display:flex;flex-direction:column;min-height:38px;position:relative;}
.multi .seg{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;font-size:8px;line-height:1.05;padding:2px;white-space:normal;word-break:break-word;border-bottom:1px solid rgba(255,255,255,.55);}
.multi .seg:last-child{border-bottom:none;}
.multi.slk{box-shadow:inset 3px 0 0 #2e9d5b;}
.seglist{display:flex;flex-wrap:wrap;gap:6px;margin:2px 0 2px;}
.segchip{display:inline-flex;align-items:center;gap:6px;font-size:12px;font-weight:700;border:1px solid rgba(0,0,0,.15);border-radius:8px;padding:5px 9px;}
.segchip .sg-t{margin-right:2px;}
.segchip b{cursor:pointer;font-size:13px;color:#a32d2d;background:rgba(255,255,255,.7);border-radius:50%;width:18px;height:18px;display:inline-flex;align-items:center;justify-content:center;}
.segchip b.mv{color:#3667c4;font-size:12px;}
.btn.pri{background:#3c3489;color:#eeedfe;border-color:#3c3489;}
.mtext{font-size:13px;color:#555;line-height:1.7;margin:8px 0 4px;}
.two.slk{box-shadow:inset 3px 0 0 #2e9d5b;}
.slkdot{position:absolute;top:1px;right:2px;font-size:7px;color:#2e9d5b;}
.lab{font-size:8px;opacity:.85;}
.sun{color:#a32d2d;}.sat{color:#185fa5;}
.cnt{position:sticky;right:0;background:#f4f6f8;font-weight:700;min-width:28px;border-left:1px solid #d8dde6;}
.alltbl{overflow-x:hidden;overflow-y:auto;}
.alltbl table{width:100%;font-size:7px;table-layout:fixed;}
.alltbl th,.alltbl td{border-right:none;border-bottom:1px solid #eceff2;}
.alltbl thead th{height:18px;font-size:7px;padding:0;line-height:1;}
.alltbl .nm{width:58px;font-size:8px;padding:0 2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.alltbl td.cell{width:auto;min-width:0;height:22px;padding:0;overflow:hidden;}
.alltbl .two{min-height:22px;height:22px;justify-content:center;line-height:1;padding:0;}
.alltbl .two span{font-size:7px;}
.alltbl .two .lab{font-size:6px;}
.alltbl .tnote,.alltbl .slkdot{display:none;}
.alltbl .multi{min-height:22px;height:22px;}
.alltbl .multi .seg{font-size:6px;padding:0;line-height:1;}
.alltbl .cnt{width:18px;font-size:8px;}
.alltbl .locbadge{min-width:10px;font-size:6px;padding:0 1px;margin-right:1px;}
.cal{display:grid;grid-template-columns:repeat(7,minmax(0,1fr));gap:1px;padding:0;background:#e6e9ed;border:1px solid #e6e9ed;border-radius:10px;overflow:hidden;}
.cal .h{text-align:center;font-size:10px;font-weight:700;color:#9aa3ad;padding:3px 0;background:#fff;}
.cal .d{min-height:60px;border:none;border-radius:0;padding:5px 3px 7px;font-size:9px;background:#fff;cursor:pointer;overflow:hidden;}
.cal .d.blank{background:#f3f5f7;cursor:default;}
.cal label.d.seld{background:#eaf3de !important;}
.cal .d.warn{outline:2px solid #e57373;outline-offset:-3px;}
.cal .dn{font-weight:700;font-size:13px;margin-bottom:5px;color:#3a424d;display:flex;align-items:baseline;}
.cal .dn .dow{font-size:9px;font-weight:600;margin-left:4px;opacity:.65;}
.cal .ln{display:block;line-height:1.3;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.cal.calnames .d,.cal.planc .d{min-height:122px;display:flex;flex-direction:column;align-items:stretch;overflow:visible;}
.cal.planc{gap:0;background:#fff;border-top:1px solid #e6e9ed;border-left:1px solid #e6e9ed;}
.cal.planc .h,.cal.planc .d{border-right:1px solid #e6e9ed;border-bottom:1px solid #e6e9ed;}
.cal.planc .d{position:relative;}
.dbars{display:flex;flex-direction:column;gap:3px;}
.cal .holm{font-size:8px;color:#fff;background:#e0556b;font-weight:700;margin-left:4px;border-radius:4px;padding:0 4px;align-self:center;}
.nchip{display:block;width:100%;font-size:8px;letter-spacing:-.2px;line-height:1.7;border-radius:6px;padding:2px 5px;font-weight:600;overflow:hidden;white-space:nowrap;text-overflow:ellipsis;}
.empt{font-size:10px;color:#c4cad2;padding:1px;}
.calbar{display:flex;flex-direction:column;gap:7px;padding:8px 8px 3px;}
.memBtn{align-self:flex-start;font-size:12px;font-weight:700;padding:6px 13px;border:1px solid #ccc;border-radius:20px;background:#fff;cursor:pointer;}
.memBtn.on{background:#3c3489;color:#eeedfe;border-color:#3c3489;}
.memchips{display:flex;flex-wrap:wrap;gap:5px;}
.memchip{font-size:12px;padding:5px 11px;border:1px solid #d6dae0;border-radius:16px;background:#fff;color:#555;cursor:pointer;}
.memchip.on{background:#27500a;color:#eaf3de;border-color:#27500a;}
.rchip{display:flex;align-items:center;width:100%;font-size:9px;font-weight:600;line-height:1.25;border-radius:4px;padding:1px 4px;color:#5a6470;border:1px solid #dfe3e8;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;background:repeating-linear-gradient(45deg,#fff,#fff 4px,#eef0f3 4px,#eef0f3 5px);}
.rchip.paid{color:#444;background:repeating-linear-gradient(45deg,#eef0f3,#eef0f3 4px,#cfd5dc 4px,#cfd5dc 5px);}
.evchip{display:flex;align-items:center;width:100%;font-size:9px;font-weight:600;line-height:1.25;border-radius:4px;padding:1px 4px;cursor:pointer;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.evchip.slk{box-shadow:inset 3px 0 0 #2e9d5b;}
.evchip.slk b{font-size:9px;margin-left:auto;}
.evbar,.evspace{display:flex;align-items:center;width:calc(100% + 6px);height:17px;margin:0 -3px;padding:1px 5px;font-size:9px;font-weight:700;line-height:1.2;white-space:nowrap;overflow:hidden;text-overflow:clip;}
.evbar{cursor:pointer;border-radius:0;box-shadow:inset 0 0 0 1px rgba(255,255,255,.28);position:relative;}
.cal.planc .evbar{overflow:visible;box-shadow:none;}
.evbar.single{width:100%;margin:0;border-radius:5px;}
.evbar.start{margin-left:0;width:calc(100% + 3px);border-radius:5px 0 0 5px;}
.evbar.end{margin-right:0;width:calc(100% + 3px);border-radius:0 5px 5px 0;}
.evbar.slk{box-shadow:inset 3px 0 0 #2e9d5b,inset 0 0 0 1px rgba(255,255,255,.28);}
.cal.planc .evbar.slk{box-shadow:inset 3px 0 0 #2e9d5b;}
.evbar .evtxt{display:block;flex:0 0 auto;white-space:nowrap;overflow:hidden;text-overflow:clip;pointer-events:none;}
.cal.planc .evbar .evtxt{position:relative;z-index:5;}
.evbar b{position:absolute;right:5px;font-size:9px;}
.evspace{visibility:hidden;}
.planbar{display:flex;align-items:center;gap:14px;flex-wrap:wrap;padding:11px 12px;border-bottom:1px solid #eef1f5;background:#fbfcfd;}
.pchk{font-size:12px;font-weight:600;color:#4a525c;display:inline-flex;align-items:center;gap:6px;cursor:pointer;}
.dayv{padding:12px 10px 16px;}
.dayhdr{display:flex;align-items:center;justify-content:space-between;gap:8px;margin-bottom:12px;}
.navbtn{width:38px;height:38px;border-radius:50%;border:1px solid #e6e9ee;background:#fff;font-size:18px;color:#4a525c;cursor:pointer;box-shadow:0 1px 3px rgba(40,50,70,.06);}
.navbtn:active{background:#f1f3f6;}
.daytitle{display:flex;align-items:center;gap:12px;}
.dnum{font-size:30px;font-weight:800;color:#2b323b;line-height:1;}
.dmeta{display:flex;flex-direction:column;gap:3px;font-size:13px;font-weight:700;color:#6b7480;}
.dhol{font-size:11px;font-weight:700;color:#fff;background:#e0556b;border-radius:5px;padding:1px 7px;align-self:flex-start;}
.daystats{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:14px;}
.dstat{font-size:11px;font-weight:700;color:#2c7a3f;background:#eaf6ed;border:1px solid #cfe9d6;border-radius:20px;padding:4px 11px;}
.dstat.ng{color:#b03b3b;background:#fdecec;border-color:#f3cccc;}
.daygrp{margin-bottom:14px;}
.daygrp-h{display:flex;align-items:center;gap:7px;font-size:12px;font-weight:800;color:#7a828c;letter-spacing:.03em;margin:0 2px 7px;}
.locdot{width:11px;height:11px;border-radius:50%;border:1px solid rgba(0,0,0,.08);}
.pcard{position:relative;display:flex;align-items:center;gap:11px;background:#fff;border:1px solid #eef1f5;border-radius:14px;padding:11px 13px 11px 16px;margin-bottom:8px;box-shadow:0 2px 8px rgba(40,50,70,.05);overflow:hidden;}
.pacc{position:absolute;left:0;top:0;bottom:0;width:6px;}
.pcard-main{flex:1;min-width:0;}
.pname{font-size:14px;font-weight:700;color:#2b323b;margin-bottom:5px;}
.pduty{display:flex;flex-wrap:wrap;gap:5px;}
.dbar{font-size:11px;font-weight:700;border-radius:8px;padding:3px 9px;white-space:nowrap;}
.pedit{color:#b6bcc4;font-size:14px;}
.dayempty{text-align:center;color:#aab0b8;font-size:13px;padding:30px 10px;}
.dgrp{margin-bottom:16px;}
.dgrp-h{display:flex;align-items:center;gap:7px;font-size:12px;font-weight:800;color:#7a828c;letter-spacing:.03em;margin:0 2px 8px;}
.dgrp-n{margin-left:2px;font-size:11px;color:#aab0b8;font-weight:700;}
.dgrp-cols{display:grid;grid-template-columns:repeat(2,1fr);gap:8px;}
.dmem{border-radius:12px;padding:9px 12px;box-shadow:0 2px 7px rgba(40,50,70,.06);overflow:hidden;cursor:default;}
.dmem .dm-n{font-size:14px;font-weight:700;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.dmem .dm-s{font-size:10px;font-weight:600;opacity:.85;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin-top:2px;}
.legend{display:flex;flex-wrap:wrap;gap:5px 9px;margin:8px 2px;font-size:10px;color:#555;}
.legend span{display:inline-flex;align-items:center;gap:3px;}
.dot{width:13px;height:13px;border-radius:2px;display:inline-block;border:1px solid #ccc;}
.modal-bg{display:none;position:fixed;inset:0;background:rgba(0,0,0,.4);z-index:50;align-items:flex-end;justify-content:center;}
.modal-bg.on{display:flex;}
.modal{background:#fff;width:100%;max-width:560px;border-radius:16px 16px 0 0;padding:14px;max-height:88vh;overflow:auto;}
.modal h3{font-size:15px;margin-bottom:2px;}
.modal .x{float:right;border:none;background:#eee;width:28px;height:28px;border-radius:50%;font-size:16px;cursor:pointer;}
.sec{font-size:11px;color:#666;margin:10px 0 4px;font-weight:700;}
.grid3{display:grid;grid-template-columns:repeat(3,1fr);gap:6px;}
.grid3 button,.btn{padding:10px 4px;border:1px solid #ccc;border-radius:8px;font-size:12px;font-weight:700;cursor:pointer;background:#fff;}
.patwrap{position:relative;display:flex;min-width:0;}
.patwrap .patmain{width:100%;min-height:38px;}
.patwrap.hasdel .patmain{padding-right:24px;}
.grid3 .patdel{position:absolute;right:3px;top:3px;width:20px;height:20px;padding:0;border-radius:50%;border:1px solid rgba(163,45,45,.25);background:rgba(255,255,255,.86);color:#a32d2d;font-size:13px;line-height:1;font-weight:800;}
.locsel{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:6px;}
.locsel button{padding:6px 10px;border:1px solid #ccc;border-radius:8px;font-size:12px;cursor:pointer;}
.locsel button.on{outline:2px solid #2f80ed;}
	.free{display:flex;gap:6px;align-items:center;flex-wrap:wrap;margin-top:6px;}
	.free input{width:64px;font-size:13px;padding:6px;border:1px solid #ccc;border-radius:7px;text-align:center;}
.copybox{border:1px solid #dfe3e8;background:#fbfcfd;border-radius:10px;padding:8px;margin:8px 0 2px;}
.copybox .copytxt{font-size:11px;color:#66707c;margin-bottom:6px;line-height:1.45;}
.tabletools{display:flex;align-items:center;gap:6px;flex-wrap:wrap;padding:8px;border-bottom:1px solid #eef1f5;background:#fbfcfd;position:sticky;left:0;z-index:12;}
.tabletools button{font-size:12px;padding:7px 10px;border:1px solid #ccc;border-radius:8px;background:#fff;cursor:pointer;font-weight:700;}
.tabletools button.on{background:#27500a;color:#eaf3de;border-color:#27500a;}
.tabletools button.save{background:#3c3489;color:#eeedfe;border-color:#3c3489;}
.bulk{display:flex;align-items:center;gap:6px;flex-wrap:wrap;background:#f5f5f5;border:1px solid #ddd;border-radius:8px;padding:8px;margin-bottom:8px;font-size:12px;}
.scard{border:1px solid #eee;border-radius:8px;padding:7px;margin-bottom:7px;}
.setrow{display:flex;align-items:center;gap:8px;padding:4px 2px;font-size:12px;flex-wrap:wrap;}
.setrow input{width:48px;font-size:13px;padding:4px;border:1px solid #ccc;border-radius:6px;text-align:center;}
.wrwrap{display:flex;flex-wrap:wrap;gap:3px 7px;margin-top:4px;}
.wrwrap label{font-size:11px;display:inline-flex;align-items:center;gap:2px;}
.wrwrap select{font-size:11px;padding:2px;border:1px solid #ccc;border-radius:5px;}
.toast{position:fixed;left:50%;bottom:18px;transform:translateX(-50%);background:#222;color:#fff;font-size:13px;padding:9px 16px;border-radius:20px;opacity:0;transition:.2s;pointer-events:none;z-index:80;}
.toast.on{opacity:.95;}
</style>
</head>

function finishSwipe(delta){if(curView==='day')finishDaySwipe(delta);else finishViewSwipe(delta);}
function initViewSwipe(){
  if(window.__viewSwipeReady)return;window.__viewSwipeReady=true;
  var sx=0,sy=0,st=0,scrollEl=null,live=false;
  function modalOpen(){var m=document.getElementById('mbg');return m&&String(m.className).indexOf('on')>=0;}
  function isControl(el){for(var n=el;n&&n!==document.body;n=n.parentNode){var tag=String(n.tagName||'').toLowerCase(),cls=String(n.className||'');if(/^(button|input|select|textarea|a|label)$/.test(tag))return true;if(/\b(views|bar|modal|modal-bg)\b/.test(cls))return true;}return false;}
  function hScroll(el){for(var n=el;n&&n!==document.body;n=n.parentNode){if(n.scrollWidth&&n.clientWidth&&n.scrollWidth>n.clientWidth+8)return n;}return null;}
  function canScroll(el,dx){if(!el)return false;if(dx<0)return el.scrollLeft+el.clientWidth<el.scrollWidth-2;if(dx>0)return el.scrollLeft>2;return false;}
  document.addEventListener('touchstart',function(e){if(!e.touches||e.touches.length!==1||modalOpen()||isControl(e.target)){sx=0;return;}var t=e.touches[0];sx=t.clientX;sy=t.clientY;st=Date.now();scrollEl=hScroll(e.target);live=false;},{passive:true});
  document.addEventListener('touchmove',function(e){if(!sx||modalOpen())return;var t=e.touches&&e.touches[0];if(!t)return;var dx=t.clientX-sx,dy=t.clientY-sy,ax=Math.abs(dx),ay=Math.abs(dy);if(ax<14)return;if(ax<ay*1.15){sx=0;settleViewPanel();return;}if(canScroll(scrollEl,dx))return;live=true;if(e.preventDefault)e.preventDefault();dragViewPanel(dx);},{passive:false});
  document.addEventListener('touchend',function(e){if(!sx||modalOpen())return;var t=e.changedTouches&&e.changedTouches[0];if(!t)return;var dx=t.clientX-sx,dy=t.clientY-sy,ax=Math.abs(dx),ay=Math.abs(dy),delta=dx<0?1:-1;sx=0;if(!live||ax<68||ax<ay*1.35||(Date.now()-st>900&&ax<120)){settleViewPanel();return;}if(e.preventDefault)e.preventDefault();finishSwipe(delta);},{passive:false});
  document.addEventListener('touchcancel',function(){sx=0;settleViewPanel();},{passive:true});
}

/* 半自動編成 */
function wrule(s,day){if(day.hol&&s.wr&&s.wr.h)return s.wr.h;return (s.wr&&s.wr[day.dow])||'';}
function consec(sid,d){var c=0;for(var x=d-1;x>=1;x--){var cc=cellFor(sid,x);if(cc&&(cc.k==='work'||cc.k==='task'))c++;else break;}return c;}
function freeCell(sid,d){return !cellFor(sid,d);}
function busyLoc(sid,d){var c=cellFor(sid,d);return (c&&(c.k==='work'||c.k==='task'))?c.loc:null;}
function autoFill(silent){
  var days=daysIn(curY,curM);
  Object.keys(DATA).forEach(function(k){if(DATA[k]&&DATA[k].auto)delete DATA[k];});
  var wc={};STAFF.forEach(function(s){wc[s.id]=0;});
  STAFF.forEach(function(s){days.forEach(function(day){var c=cellFor(s.id,day.d);if(c&&(c.k==='work'||c.k==='task'||c.k==='paid'))wc[s.id]++;});});
  function place(sid,d,o){DATA[key(sid,d)]={k:'work',loc:o.loc,in:o.in,out:o.out,auto:true};wc[sid]++;}
  function canWork(s,day,soft){var r=wrule(s,day);if(r==='off'&&!soft)return false;return true;}
  function canE(s,day,soft){var r=wrule(s,day);if(r==='lateOnly')return false;if(r==='earlyOnly')return true;if(r==='off'&&!soft)return false;return s.e!==false;}
  function canL(s,day,soft){var r=wrule(s,day);if(r==='earlyOnly')return false;if(r==='lateOnly')return true;if(r==='off'&&!soft)return false;return s.l!==false;}
  var alerts=[];
  days.forEach(function(day){var d=day.d,dow=day.dow;
    if(isOpen('suna',dow)){var io=(dow===0||dow===6||day.hol)?['8:00','18:00']:['9:00','18:00'];
      function haveS(){var n=0;SUNA_CAND.forEach(function(sid){if(hasDuty(sid,d,'suna'))n++;});return n;}
      function tryS(soft){SUNA_CAND.slice().sort(function(a,b){return wc[a]-wc[b];}).forEach(function(sid){if(haveS()>=2)return;var s=staffOf(sid);if(!freeCell(sid,d)||s.locs.indexOf('suna')<0||consec(sid,d)>=6||wc[sid]>=s.max||!canWork(s,day,soft))return;place(sid,d,{loc:'suna',in:io[0],out:io[1]});});}
      tryS(false);if(haveS()<2)tryS(true);var hs=haveS();if(hs===1)alerts.push(d+'日 SUNAGODA1人');else if(hs===0)alerts.push(d+'日 SUNAGODA0人');}
    var earlyNeed=2,lateNeed=(dow>=1&&dow<=4&&!day.hol)?1:2;
    function curE(){var n=0;ISE_POOL.forEach(function(sid){var c=cellFor(sid,d);if(c&&c.k==='work'&&c.loc==='ise'&&startH(c.in)<14)n++;});return n;}
    function curL(){var n=0;ISE_POOL.forEach(function(sid){var c=cellFor(sid,d);if(c&&c.k==='work'&&c.loc==='ise'&&startH(c.in)>=14)n++;});return n;}
    function pool(){return ISE_POOL.slice().sort(function(a,b){return wc[a]-wc[b];});}
    function fE(soft){pool().forEach(function(sid){if(curE()>=earlyNeed)return;var s=staffOf(sid);if(!freeCell(sid,d)||consec(sid,d)>=6||wc[sid]>=s.max)return;var pc=cellFor(sid,d-1);if(pc&&pc.k==='work'&&startH(pc.in)>=14)return;if(!canE(s,day,soft))return;place(sid,d,{loc:'ise',in:'8:00',out:'17:00'});});}
    function fL(soft){pool().forEach(function(sid){if(curL()>=lateNeed)return;var s=staffOf(sid);if(!freeCell(sid,d)||consec(sid,d)>=6||wc[sid]>=s.max)return;if(!canL(s,day,soft))return;place(sid,d,{loc:'ise',in:'16:30',out:'24:30'});});}
    fE(false);if(curE()<earlyNeed)fE(true);fL(false);if(curL()<lateNeed)fL(true);
    if((curE()<earlyNeed||curL()<lateNeed)&&freeCell(1,d)&&consec(1,d)<6){if(curE()<earlyNeed)place(1,d,{loc:'ise',in:'8:00',out:'17:00'});else place(1,d,{loc:'ise',in:'16:30',out:'24:30'});}
    if(curE()<earlyNeed)alerts.push(d+'日 伊勢宮早番不足');if(curL()<lateNeed)alerts.push(d+'日 伊勢宮遅番不足');
    if(isOpen('bhavan',dow)&&freeCell(2,d)&&consec(2,d)<6)place(2,d,{loc:'bhavan',in:'13:30',out:'22:30'});
  });
  dirty=true;save_alerts=alerts;if(!silent){render();pushState();toast('半自動編成しました'+(alerts.length?'（要確認 '+alerts.length+'件）':'：充足'));}
}

  if(c.k==='task'){var t=c.label;if(t==='事務')return solid(COL.office);if(t==='SETS'||t==='焙煎'||t==='RO')return solid(COL.roast);if(t==='出張')return solid(COL.trip);if(t==='出店')return solid(COL.popup);if(t==='イベント')return solid(COL.event);if(t==='MTG')return solid(COL.mtg);return solid('#eee');}
  if(c.k==='work'){if(c.loc==='ise')return solid(startH(c.in)>=14?COL.iseNight:COL.iseDay);if(c.loc==='suna')return solid(COL.suna);if(c.loc==='roast')return solid(COL.roast);if(c.loc==='bhavan')return solid(startH(c.in)>=18?COL.bhavanNight:COL.bhavan);if(c.loc==='owner')return solid(COL.owner);}return solid('#fff');}

function violations(sid,d){var s0=staffOf(sid);if(s0&&s0.external)return '';var c=cellFor(sid,d);if(!isWorkCell(c))return '';var days=daysIn(curY,curM),dow=days[d-1].dow,s=staffOf(sid),w=[];

  if(c.k==='work'){if(c.loc==='ise')return startH(c.in)>=14?COL.iseNight:COL.iseDay;if(c.loc==='suna')return COL.suna;if(c.loc==='roast')return COL.roast;if(c.loc==='bhavan')return COL.bhavan;if(c.loc==='owner')return COL.owner;}

}

function dutyRank(c){
  if(c.k==='task'){var t=c.label;if(t==='出店'||t==='イベント')return 1;if(t==='出張')return 2;if(t==='事務')return 3;if(t==='SETS'||t==='焙煎'||t==='RO')return 5;return 8;}

  return 9;

function collectPlanRanges(total){

  var groups={};

  Object.keys(groups).forEach(function(k){var g=groups[k],ds=Object.keys(g.days).map(Number).sort(function(a,b){return a-b;}),s=null,p=null;ds.forEach(function(d){if(s==null){s=p=d;return;}if(d===p+1){p=d;return;}ranges.push({start:s,end:p,loc:g.loc,title:g.title,slk:true});s=p=d;});if(s!=null)ranges.push({start:s,end:p,loc:g.loc,title:g.title,slk:true});});

function planEventLayout(total,first){

      for(;;lane++){var ok=true;busy[w][lane]=busy[w][lane]||{};for(var d=cur;d<=segEnd;d++){if(busy[w][lane][d]){ok=false;break;}}if(ok)break;}
      for(var d=cur;d<=segEnd;d++){busy[w][lane][d]=true;if(!byDay[d])byDay[d]={};byDay[d][lane]={range:r,segStart:cur,segEnd:segEnd,lane:lane};}

}

function selKey(sid,d){return sid+'_'+d;}

function pushSelectCell(arr,sid,d){if(SLACK[key(sid,d)])return;for(var i=0;i<arr.length;i++)if(arr[i].sid===sid&&arr[i].d===d)return;arr.push({sid:sid,d:d});}

function toggleSelectCell(sid,d){
  var out=[],removed=false;for(var i=0;i<SEL_CELLS.length;i++){if(SEL_CELLS[i].sid===sid&&SEL_CELLS[i].d===d){removed=true;continue;}out.push(SEL_CELLS[i]);}
  if(!removed)out.push({sid:sid,d:d});SEL_CELLS=out;SEL_LAST={sid:sid,d:d};

function rangeSelectCell(sid,d){
  if(!SEL_LAST){toggleSelectCell(sid,d);return;}
  var a=staffIdx(SEL_LAST.sid),b=staffIdx(sid);if(a<0||b<0){toggleSelectCell(sid,d);return;}
  var si=Math.min(a,b),ei=Math.max(a,b),sd=Math.min(SEL_LAST.d,d),ed=Math.max(SEL_LAST.d,d),out=[];
  for(var x=si;x<=ei;x++)for(var day=sd;day<=ed;day++)pushSelectCell(out,STAFF[x].id,day);
  SEL_CELLS=out;
}
function onCell(ev,sid,d){
  if(!editMode)return;
  if(SLACK[key(sid,d)]){toast('Slack申請です。変更はSlackで');return;}
  if(ev&&(ev.shiftKey||ev.metaKey||ev.ctrlKey)){
    if(ev.preventDefault)ev.preventDefault();

    render();toast(SEL_CELLS.length+'セル選択中：選択セルをクリックして一括入力');
    return;
  }

  if(SEL_CELLS.length)clearSelection(false);
  openEdit(sid,d);
}

function targetLabel(){var n=editTargets().length;return n>1?n+'セル選択中':'1セル';}
function editFreeBoxHtml(){return '<div class="sec">自由入力（段を追加）</div><div class="free"><input id="fin" placeholder="開始 8:00" value="'+esc(EDIT_IN)+'" oninput="EDIT_IN=this.value"><span>–</span><input id="fout" placeholder="終了 17:00" value="'+esc(EDIT_OUT)+'" oninput="EDIT_OUT=this.value"><button class="btn" onclick="freeApply()">追加</button><button class="btn" onclick="registerPatternFromEdit()">この時間を登録</button></div>';}
function patternButtonHtml(lid,p,mode){
  var inn=cleanTime(p[0]),out=cleanTime(p[1]),label=esc(inn+(out?'–'+out:'')),del=!isBasePattern(lid,[inn,out]);
  var act=mode==='bulk'?"setBItem({k:'work',loc:'"+jsq(lid)+"',in:'"+jsq(inn)+"',out:'"+jsq(out)+"'},this)":"addSeg({k:'work',loc:'"+jsq(lid)+"',in:'"+jsq(inn)+"',out:'"+jsq(out)+"'})";
  var rm=mode==='bulk'?"deletePatternFromBulk('"+jsq(lid)+"','"+jsq(inn)+"','"+jsq(out)+"')":"deletePatternFromEdit('"+jsq(lid)+"','"+jsq(inn)+"','"+jsq(out)+"')";
  return '<span class="patwrap'+(del?' hasdel':'')+'"><button class="patmain'+(mode==='bulk'?' bpick':'')+'" onclick="'+act+'">'+label+'</button>'+(del?'<button class="patdel" title="登録時間を削除" onclick="event.stopPropagation();'+rm+'">×</button>':'')+'</span>';
}
function renderEditBody(sid,d){var s=staffOf(sid),days=daysIn(curY,curM),day=days[d-1];
  var multi=isMultiEdit(),c=multi?null:DATA[key(sid,d)],ps=multi?[]:dutyParts(c);
  var h='<h3>'+(multi?targetLabel():(s.name+'　'+curM+'/'+d+'('+DOW[day.dow]+')'))+'</h3>';
  if(multi)h+='<p class="mtext">ここで選んだ予定を、選択中のセルすべてに入れます。</p>';
  h+=editFreeBoxHtml();
  if(ps.length){var hasMultiSeg=!!(c&&c.segs&&c.segs.length>1);h+='<div class="sec">現在の予定（'+(hasMultiSeg?'↑↓で順番入替・':'')+'×で削除・下のボタンで段を追加）</div><div class="seglist">';
    ps.forEach(function(p,i){var fg=(p.k==='task'&&p.label==='出張')?'color:#fff;':'';var mv=hasMultiSeg?'<b class="mv" onclick="moveSeg('+i+',-1)"'+(i===0?' style="opacity:.3"':'')+'>↑</b><b class="mv" onclick="moveSeg('+i+',1)"'+(i===ps.length-1?' style="opacity:.3"':'')+'>↓</b>':'';h+='<span class="segchip" style="'+bgOf(p)+fg+'"><span class="sg-t">'+esc(segLine(p,s.home))+'</span>'+mv+'<b class="rm" onclick="removeSeg('+i+')">×</b></span>';});
    h+='</div>';}
  else if(c&&(c.k==='off'||c.k==='req'||c.k==='paid')){h+='<div class="sec">現在</div><div class="seglist"><span class="segchip" style="'+bgOf(c)+'">'+(c.k==='off'?'公休':c.k==='req'?'希望休':'有休')+'<b onclick="clearCell()">×</b></span></div>';}
  h+='<div class="sec">拠点（応援は他拠点）</div><div class="locsel">';
  LOC_ORDER.forEach(function(lid){h+='<button class="'+(lid===pickLoc?'on':'')+'" style="background:'+LOC[lid].head+'" onclick="switchPickLoc(\''+lid+'\','+sid+','+d+')">'+LOC[lid].name+(isOpen(lid,day.dow)?'':'(定休)')+'</button>';});h+='</div>';
  var pats=PAT[pickLoc]||[];if(pats.length){h+='<div class="sec">'+LOC[pickLoc].name+' の時間（タップで段を追加）</div><div class="grid3">';pats.forEach(function(p){h+=patternButtonHtml(pickLoc,p,'edit');});h+='</div>';}
  h+='<div class="sec">業務・イベント（タップで段を追加）</div>';
  h+='<div class="free" style="margin:0 0 6px"><input id="tnote" placeholder="詳細・イベント名（任意）" value="'+esc(EDIT_NOTE)+'" oninput="EDIT_NOTE=this.value" style="flex:1;min-width:0;text-align:left"></div>';
  h+='<div class="grid3">';TASKS.forEach(function(t){h+='<button onclick="addTask(\''+t+'\')">'+t+'</button>';});h+='</div>';
  h+='<div class="sec">休み（1日全体・段は無し）</div><div class="grid3"><button onclick="setCell({k:\'off\'})">公休</button><button onclick="setCell({k:\'req\'})">希望休</button><button onclick="setCell({k:\'paid\'})">有休</button></div>';
  h+='<div class="sec">リセット</div><div class="grid3"><button style="background:#fff3e0;border-color:#e0a060" onclick="clearCell()">空に戻す（自動対象）</button></div>';
  h+='<div class="sec">コピー・貼り付け</div>'+copyBoxHtml(c,s.home);
  document.getElementById('mbody').innerHTML=h;}
function captureEditDraft(){var i=document.getElementById('fin'),o=document.getElementById('fout'),n=document.getElementById('tnote');if(i)EDIT_IN=i.value;if(o)EDIT_OUT=o.value;if(n)EDIT_NOTE=n.value;}
function switchPickLoc(lid,sid,d){captureEditDraft();pickLoc=lid;renderEditBody(sid,d);}
function registerPatternFromEdit(){captureEditDraft();var i=cleanTime(EDIT_IN),o=cleanTime(EDIT_OUT);if(!i){toast('開始時刻を入力してください');return;}if(addPatternLocal(pickLoc,i,o)){savePatterns();toast(LOC[pickLoc].name+'に '+i+(o?'–'+o:'')+' を登録しました');}else toast('この時間は登録済みです');renderEditBody(editT.sid,editT.d);}
function deletePatternFromEdit(lid,inn,out){captureEditDraft();var r=removePatternLocal(lid,inn,out);if(r==='ok'){savePatterns();toast('登録時間を削除しました');}else if(r==='base')toast('最初からある時間は削除できません');else toast('登録時間が見つかりません');renderEditBody(editT.sid,editT.d);}
function cloneCell(c){return c?JSON.parse(JSON.stringify(c)):null;}
function copyBoxHtml(c,home){
  var h='<div class="copybox"><div class="copytxt">';
  h+=isMultiEdit()?'コピーした予定があれば、選択セルすべてへ貼り付けできます。':(COPY_CELL?('コピー中：'+esc(COPY_LABEL)):'別の日・別スタッフへ写したい予定をここでコピーできます。');
  h+='</div><div class="setrow" style="padding:0">';
  if(c)h+='<button class="btn" onclick="copyCurrentCell()">この予定をコピー</button>';
  if(COPY_CELL)h+='<button class="btn pri" onclick="pasteCopiedCell()">貼り付け</button><button class="btn" onclick="clearCopiedCell()">コピー解除</button>';
  h+='</div></div>';
  return h;
}
function copyCurrentCell(){
  var s=staffOf(editT.sid),c=DATA[key(editT.sid,editT.d)];
  if(!c){toast('コピーする予定がありません');return;}
  COPY_CELL=cloneCell(c);COPY_LABEL=s.name+' '+curM+'/'+editT.d+' '+cellPillTxt(c,s.home);
  renderEditBody(editT.sid,editT.d);toast('予定をコピーしました');
}
function clearCopiedCell(){COPY_CELL=null;COPY_LABEL='';renderEditBody(editT.sid,editT.d);toast('コピーを解除しました');}
function pasteCopiedCell(){
  if(!COPY_CELL){toast('コピー中の予定がありません');return;}
  applyCellValue(COPY_CELL,'コピーした予定を貼り付けました');
}
function applyCellValue(o,msg){
  var tg=editTargets(),n=0;
  tg.forEach(function(t){if(SLACK[key(t.sid,t.d)])return;var v=cloneCell(o);v.manual=true;DATA[key(t.sid,t.d)]=v;n++;});
  dirty=true;clearSelection(false);closeModal();pushState();render();toast((n>1?n+'セルに':'')+(msg||'入力しました'));
}
function setCell(o){applyCellValue(o,'入力しました');}
function addTask(label){var n=document.getElementById('tnote'),note=n?n.value.trim():'';var o={k:'task',loc:pickLoc,label:label};if(note)o.note=note;addSeg(o);}
function addSeg(o){
  o.manual=true;
  if(isMultiEdit()){applyCellValue(o,'入力しました');return;}
  var k=key(editT.sid,editT.d),c=DATA[k];
  if(!c||c.k==='off'||c.k==='req'||c.k==='paid'){DATA[k]=o;}
  else if(c.segs&&c.segs.length){c.segs.push(o);}
  else {DATA[k]={k:'work',manual:true,segs:[c,o]};}
  dirty=true;clearSelection(false);closeModal();pushState();render();toast(DATA[k].segs?'段を追加しました':'入力しました');
}
function moveSeg(idx,dir){var k=key(editT.sid,editT.d),c=DATA[k];if(!c||!c.segs)return;var j=idx+dir;if(j<0||j>=c.segs.length)return;var t=c.segs[idx];c.segs[idx]=c.segs[j];c.segs[j]=t;dirty=true;pushState();render();renderEditBody(editT.sid,editT.d);}
function removeSeg(idx){var k=key(editT.sid,editT.d),c=DATA[k];if(!c)return;var ps=dutyParts(c).slice();ps.splice(idx,1);
  if(ps.length===0)delete DATA[k];else if(ps.length===1){var one=ps[0];one.manual=true;DATA[k]=one;}else{DATA[k]={k:'work',manual:true,segs:ps};}
  dirty=true;pushState();render();renderEditBody(editT.sid,editT.d);}
function clearCell(){var tg=editTargets(),n=0;tg.forEach(function(t){delete DATA[key(t.sid,t.d)];n++;});dirty=true;clearSelection(false);closeModal();pushState();render();toast((n>1?n+'セルを':'')+'空に戻しました（自動編成の対象）');}
function freeApply(){captureEditDraft();var i=cleanTime(EDIT_IN),o=cleanTime(EDIT_OUT);if(!i){toast('開始時刻を入力');return;}addSeg({k:'work',loc:pickLoc,in:i,out:o});}

/* 設定 */
function ival(id,def){var e=document.getElementById(id);var n=e?parseInt(e.value,10):NaN;return isFinite(n)?n:def;}
function vof(id){var e=document.getElementById(id);return e?e.value:'';}
function wrSel(id,val){var o='<select id="'+id+'">';WR_OPTS.forEach(function(p){o+='<option value="'+p[0]+'"'+(p[0]===val?' selected':'')+'>'+p[1]+'</option>';});return o+'</select>';}
function openSettings(){
  var h='<h3>勤務日数・曜日条件の設定</h3>';
  h+='<div class="bulk">一括設定 下限<input type="number" id="bmn" value="18"> 上限<input type="number" id="bmx" value="22"> <button class="btn" onclick="bulkApply()">全員へ反映</button></div>';
  STAFF.forEach(function(s){h+='<div class="scard"><b>'+s.name+'</b> <span style="color:#999;font-size:11px">'+LOC[s.home].name+'</span>'+
    '<div class="setrow">下限<input type="number" id="mn_'+s.id+'" value="'+s.min+'"> 上限<input type="number" id="mx_'+s.id+'" value="'+s.max+'"></div>'+
    '<div class="wrwrap">';
    [[1,'月'],[2,'火'],[3,'水'],[4,'木'],[5,'金'],[6,'土'],[0,'日']].forEach(function(p){h+='<label>'+p[1]+wrSel('wr_'+s.id+'_'+p[0],(s.wr&&s.wr[p[0]])||'')+'</label>';});
    h+='<label>祝'+wrSel('wr_'+s.id+'_h',(s.wr&&s.wr.h)||'')+'</label></div></div>';});
  h+='<div class="setrow" style="justify-content:flex-end;margin-top:8px"><button class="btn" onclick="closeModal()">閉じる</button> <button class="btn" style="background:#27500a;color:#eaf3de;border-color:#27500a" onclick="saveSettingsNow()">保存して再編成</button></div>';
  h+='<div style="font-size:10px;color:#888;margin-top:6px">下限=最低これくらい／上限=これ以上は入れない。原則休み=基本候補から外し人員不足時のみ最終候補。</div>';
  openModal(h);
}
function bulkApply(){var mn=ival('bmn',18),mx=ival('bmx',22);STAFF.forEach(function(s){var a=document.getElementById('mn_'+s.id),b=document.getElementById('mx_'+s.id);if(a)a.value=mn;if(b)b.value=mx;});}
function saveSettingsNow(){var obj={staff:{},patterns:patternObj()};STAFF.forEach(function(s){s.min=ival('mn_'+s.id,s.min);s.max=ival('mx_'+s.id,s.max);var wr={};[1,2,3,4,5,6,0].forEach(function(dw){var v=vof('wr_'+s.id+'_'+dw);if(v)wr[dw]=v;});var hv=vof('wr_'+s.id+'_h');if(hv)wr.h=hv;s.wr=wr;obj.staff[s.id]={min:s.min,max:s.max,wr:s.wr};});MSETTINGS=obj;function done(){closeModal();autoFill(true);render();toast('設定を保存し再編成しました');}function failed(e){closeModal();autoFill(true);render();toast('設定保存失敗:'+e);}if(hasGAS()){google.script.run.saveMSettings(JSON.stringify(obj));done();}else if(hasRemote())remotePost({api:'saveMSettings',payload:JSON.stringify(obj)},done,failed);else done();}

/* 履歴（やり直す/進む） */
var HIST=[],HISTI=-1;
function pushState(){HIST=HIST.slice(0,HISTI+1);HIST.push(JSON.stringify(DATA));HISTI=HIST.length-1;if(HIST.length>60){HIST.shift();HISTI--;}updHist();}
function undo(){if(HISTI<=0){toast('これ以上戻れません');return;}HISTI--;DATA=JSON.parse(HIST[HISTI]);dirty=true;render();updHist();}
function redo(){if(HISTI>=HIST.length-1){toast('これ以上進めません');return;}HISTI++;DATA=JSON.parse(HIST[HISTI]);dirty=true;render();updHist();}
function updHist(){var u=document.getElementById('undoBtn'),r=document.getElementById('redoBtn');if(u)u.disabled=HISTI<=0;if(r)r.disabled=HISTI>=HIST.length-1;}
/* 一括入力 */
var bulkItem=null,bulkLoc='ise';
function openBulk(){
  var days=daysIn(curY,curM),first=(days[0].dow+6)%7;bulkLoc='ise';
  var h='<h3>一括入力</h3><div class="sec">対象スタッフ</div><select id="bStaff" onchange="bStaffChanged()" style="width:100%;font-size:14px;padding:7px;border:1px solid #ccc;border-radius:8px">';
  STAFF.forEach(function(s){h+='<option value="'+s.id+'">'+s.name+'</option>';});h+='</select>';
  h+='<div class="sec">拠点</div><div class="locsel" id="bLocs"></div>';
  h+='<div class="sec">拠点の時間（タップで選択）</div><div class="grid3" id="bItems"></div>';
  h+='<div class="sec">業務・イベント</div>';
  h+='<div class="free" style="margin:0 0 6px"><input id="bnote" placeholder="詳細・イベント名（任意）" style="flex:1;min-width:0;text-align:left"></div>';
  h+='<div class="grid3" id="bTasks"></div>';
  h+='<div class="sec">自由入力</div><div class="free"><input id="bin" placeholder="開始 8:00"><span>–</span><input id="bout" placeholder="終了 17:00"><button class="btn" onclick="setBulkFree()">この時間を選択</button><button class="btn" onclick="registerPatternFromBulk()">この時間を登録</button></div>';
  h+='<div class="sec">休み・リセット</div><div class="grid3" id="bRest"></div>';
  h+='<div class="sec">日付を選択</div><div style="display:flex;gap:6px;flex-wrap:wrap;margin:4px 0"><button class="btn" onclick="bPick(\'all\')">全選択</button><button class="btn" onclick="bPick(\'none\')">解除</button><button class="btn" onclick="bPick(\'we\')">土日</button><button class="btn" onclick="bPick(\'wd\')">平日</button></div>';
  h+='<div class="cal" style="max-height:230px;overflow:auto">';DOW_MON.forEach(function(n,i){h+='<div class="h '+(i===5?'sat':i===6?'sun':'')+'">'+n+'</div>';});
  for(var b=0;b<first;b++)h+='<div class="d blank"></div>';
  days.forEach(function(day){var cls=dcls(day);h+='<label class="d" style="display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:40px" onclick="this.classList.toggle(\'seld\')"'+(day.hol?' title="'+day.holName+'"':'')+'><span class="dn '+cls+'">'+day.d+'</span><input type="checkbox" class="bchk" data-d="'+day.d+'"></label>';});
  h+='</div><div class="setrow" style="justify-content:flex-end;margin-top:8px"><button class="btn" onclick="closeModal()">閉じる</button> <button class="btn" style="background:#27500a;color:#eaf3de;border-color:#27500a" onclick="applyBulk()">選択日に入力</button></div>';
  openModal(h);bulkItem=null;bStaffChanged();
}
function bStaffChanged(){var s=staffOf(+vof('bStaff'));if(s)bulkLoc=s.home;renderBItems();}
function renderBItems(){
  var locs=document.getElementById('bLocs'),times=document.getElementById('bItems'),tasks=document.getElementById('bTasks'),rest=document.getElementById('bRest');if(!times)return;
  var h='';
  if(locs){LOC_ORDER.forEach(function(lid){h+='<button class="'+(lid===bulkLoc?'on':'')+'" style="background:'+LOC[lid].head+'" onclick="setBulkLoc(\''+lid+'\')">'+LOC[lid].name+'</button>';});locs.innerHTML=h;}
  h='';(PAT[bulkLoc]||[]).forEach(function(p){h+=patternButtonHtml(bulkLoc,p,'bulk');});
  if(!h)h='<button class="bpick" onclick="toast(\'この拠点は自由入力で時間を入れてください\')">自由入力で指定</button>';
  times.innerHTML=h;
  if(tasks){h='';TASKS.forEach(function(t){h+='<button class="bpick" onclick="setBulkTask(\''+t+'\',this)">'+t+'</button>';});tasks.innerHTML=h;}
  if(rest){rest.innerHTML='<button class="bpick" onclick="setBItem({k:\'off\'},this)">公休</button><button class="bpick" onclick="setBItem({k:\'req\'},this)">希望休</button><button class="bpick" onclick="setBItem({k:\'paid\'},this)">有休</button><button class="bpick" style="background:#fff3e0" onclick="setBItem({clear:true},this)">空に戻す</button>';}
}
function setBulkLoc(lid){bulkLoc=lid;bulkItem=null;renderBItems();}
function clearBulkOutlines(){var bs=document.querySelectorAll('#bItems .bpick,#bTasks .bpick,#bRest .bpick');for(var i=0;i<bs.length;i++)bs[i].style.outline='none';}
function setBItem(o,el){bulkItem=o;clearBulkOutlines();if(el)el.style.outline='3px solid #3c3489';}
function bulkNote(){var n=document.getElementById('bnote');return n?n.value.trim():'';}
function setBulkTask(label,el){var o={k:'task',loc:bulkLoc,label:label};var n=bulkNote();if(n)o.note=n;setBItem(o,el);}
function setBulkFree(){var i=cleanTime(vof('bin')),o=cleanTime(vof('bout'));if(!i){toast('開始時刻を入力');return;}setBItem({k:'work',loc:bulkLoc,in:i,out:o},null);toast('自由時間を選択しました');}
function registerPatternFromBulk(){var i=cleanTime(vof('bin')),o=cleanTime(vof('bout'));if(!i){toast('開始時刻を入力してください');return;}if(addPatternLocal(bulkLoc,i,o)){savePatterns();renderBItems();toast(LOC[bulkLoc].name+'に '+i+(o?'-'+o:'')+' を登録しました');}else toast('この時間は登録済みです');}
function deletePatternFromBulk(lid,inn,out){var r=removePatternLocal(lid,inn,out);if(r==='ok'){if(bulkItem&&bulkItem.k==='work'&&bulkItem.loc===lid&&samePattern([bulkItem.in,bulkItem.out],[inn,out]))bulkItem=null;savePatterns();renderBItems();toast('登録時間を削除しました');}else if(r==='base')toast('最初からある時間は削除できません');else toast('登録時間が見つかりません');}
function buildBulkItem(){if(!bulkItem)return null;var o=cloneCell(bulkItem);if(o&&o.k==='task'){var n=bulkNote();if(n)o.note=n;else delete o.note;}return o;}
function bPick(mode){var chk=document.querySelectorAll('.bchk'),dd=daysIn(curY,curM);for(var i=0;i<chk.length;i++){var c=chk[i],d=+c.getAttribute('data-d'),dow=dd[d-1].dow,on;if(mode==='all')on=true;else if(mode==='none')on=false;else if(mode==='we')on=(dow===0||dow===6);else on=(dow>=1&&dow<=5);c.checked=on;if(c.parentNode)c.parentNode.classList[on?'add':'remove']('seld');}}
function applyBulk(){var item=buildBulkItem();if(!item){toast('内容を選んでください');return;}var sid=+document.getElementById('bStaff').value,chk=document.querySelectorAll('.bchk'),ds=[];for(var i=0;i<chk.length;i++)if(chk[i].checked)ds.push(+chk[i].getAttribute('data-d'));if(!ds.length){toast('日付を選んでください');return;}
  var done=0,skip=0;ds.forEach(function(d){if(SLACK[key(sid,d)]){skip++;return;}if(item.clear){delete DATA[key(sid,d)];done++;return;}var o=cloneCell(item);o.manual=true;DATA[key(sid,d)]=o;done++;});
  dirty=true;pushState();closeModal();render();toast(done+'日に入力しました'+(skip?'（Slack申請 '+skip+'日は除外）':''));}
function openModal(html){document.getElementById('mbody').innerHTML=html;document.getElementById('mbg').classList.add('on');}
function closeModal(){document.getElementById('mbg').classList.remove('on');}
var tt=null;function toast(m){var t=document.getElementById('toast');t.textContent=m;t.classList.add('on');if(tt)clearTimeout(tt);tt=setTimeout(function(){t.classList.remove('on');},2400);}

restoreViewState();applySettings();initViewSwipe();refresh();
if(document.addEventListener)document.addEventListener('keydown',function(e){if(e.ctrlKey||e.metaKey){var k=String(e.key||'').toLowerCase();if(k==='z'){e.preventDefault();undo();}else if(k==='y'){e.preventDefault();redo();}}});
</script>
</body>
</html>
